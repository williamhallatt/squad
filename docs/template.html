<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}} - Squad Docs</title>
<link rel="stylesheet" href="assets/style.css">
<link rel="stylesheet" href="assets/hljs-light.css" id="hljs-light">
<link rel="stylesheet" href="assets/hljs-dark.css" id="hljs-dark" disabled>
</head>
<body>
<div class="layout">
{{NAV}}
<div class="main">
<div class="topbar">
<button class="menu-btn" onclick="toggleSidebar()">&#9776;</button>
<div class="search-box"><input type="text" id="search" placeholder="Search docs..." autocomplete="off"><div class="search-results" id="search-results"></div></div>
<button class="theme-toggle" onclick="toggleTheme()" id="theme-btn"></button>
</div>
<article class="content">
{{CONTENT}}
</article>
</div>
</div>
<script>var searchIndex = {{SEARCH_INDEX}};</script>
<script src="assets/script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: true,
    theme: document.documentElement.getAttribute('data-theme') === 'light' ? 'default' : 'dark',
    flowchart: { useMaxWidth: true, htmlLabels: true },
    sequence: { useMaxWidth: true },
    themeVariables: {
      darkMode: document.documentElement.getAttribute('data-theme') !== 'light'
    }
  });
</script>
</body>
</html>
